[phases]
  [phases.setup]
    nixPkgs = ["python311", "python311Packages.pip", "python311Packages.setuptools"]
  [phases.install]
    cmds = ["pip install -r requirements.txt"]
  [phases.build]
    cmds = ["python manage.py collectstatic --noinput"]

[deploy]
  startCommand = "gunicorn config.wsgi --workers=3 --threads=2 --timeout=120 --access-logfile=- --log-level=info"

[variables]
  DJANGO_DEBUG = "False"
